<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Visualizer</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #06001a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #canvas { display: block; width: 100vw; height: 100vh; }

    /* ── Landing overlay ─────────────────────────────────────────────────────── */
    #ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: radial-gradient(ellipse at center, rgba(80,0,160,0.55) 0%, rgba(6,0,26,0.92) 70%);
      backdrop-filter: blur(12px);
      z-index: 20;
      transition: opacity 0.5s, visibility 0.5s;
    }

    #ui.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    #ui h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, #00ffcc 0%, #aa44ff 50%, #ff0088 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(0,255,204,0.4));
    }

    #dropzone {
      width: min(420px, 90vw);
      padding: 2.5rem 2rem;
      border: 2px dashed rgba(0,255,204,0.35);
      border-radius: 18px;
      background: rgba(0,255,204,0.04);
      text-align: center;
      cursor: pointer;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }

    #dropzone:hover, #dropzone.drag-over {
      border-color: #00ffcc;
      background: rgba(0,255,204,0.1);
      box-shadow: 0 0 30px rgba(0,255,204,0.15), inset 0 0 20px rgba(0,255,204,0.05);
    }

    #dropzone svg { display: block; margin: 0 auto 1rem; opacity: 0.7; }
    #dropzone p.hint    { font-size: 0.95rem; color: rgba(255,255,255,0.85); margin-bottom: 0.4rem; }
    #dropzone p.formats { font-size: 0.72rem; color: rgba(255,255,255,0.35); letter-spacing: 0.05em; }

    #browse-btn {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 0.55rem 1.8rem;
      border: 1.5px solid rgba(0,255,204,0.6);
      border-radius: 8px;
      color: #00ffcc;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      background: transparent;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #browse-btn:hover { background: rgba(0,255,204,0.15); box-shadow: 0 0 16px rgba(0,255,204,0.25); }
    #file-input { display: none; }
    #status { font-size: 0.76rem; color: rgba(255,255,255,0.35); letter-spacing: 0.04em; }

    /* ── Loading screen ──────────────────────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: rgba(6,0,26,0.9);
      backdrop-filter: blur(10px);
      z-index: 25;
    }
    #loading.visible { display: flex; }
    #loading-title   { font-size: 0.8rem; color: #00ffcc; letter-spacing: 0.12em; text-transform: uppercase; }
    #track-name-loading {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      max-width: 340px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #progress-bar-wrap {
      width: min(320px, 80vw);
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffcc, #aa44ff);
      border-radius: 99px;
      transition: width 0.15s linear;
      box-shadow: 0 0 8px rgba(0,255,204,0.6);
    }
    #progress-pct { font-size: 0.72rem; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; }

    /* ── Playback controls ───────────────────────────────────────────────────── */
    #controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: none;
      flex-direction: column;
      background: rgba(6, 0, 26, 0.82);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      z-index: 10;
    }
    #controls.visible { display: flex; }

    /* Thin seekable progress line at the very top of the control bar */
    #ctrl-progress-wrap {
      height: 4px;
      background: rgba(255,255,255,0.08);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }
    #ctrl-progress-wrap:hover { height: 6px; }
    #ctrl-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffcc, #aa44ff, #ff0088);
      pointer-events: none;
      transition: width 0.1s linear;
    }
    #ctrl-progress-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px rgba(0,255,204,0.8);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    #ctrl-progress-wrap:hover #ctrl-progress-thumb { opacity: 1; }

    /* Row with track info, buttons, time */
    #ctrl-inner {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 20px 12px;
    }

    #ctrl-name {
      flex: 1;
      min-width: 0;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Button group */
    #ctrl-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }
    .ctrl-btn:hover {
      background: rgba(0,255,204,0.14);
      border-color: rgba(0,255,204,0.5);
      color: #00ffcc;
    }

    /* Play/Pause is larger and more prominent */
    #btn-playpause {
      width: 46px;
      height: 46px;
      background: rgba(0,255,204,0.14);
      border-color: rgba(0,255,204,0.45);
      color: #00ffcc;
    }
    #btn-playpause:hover {
      background: rgba(0,255,204,0.28);
      box-shadow: 0 0 18px rgba(0,255,204,0.35);
    }

    #ctrl-time {
      font-size: 0.73rem;
      color: rgba(255,255,255,0.38);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 90px;
      text-align: right;
    }

    /* Keyboard hint */
    #ctrl-hint {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.2);
      text-align: center;
      padding-bottom: 4px;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Landing -->
  <div id="ui">
    <h1>AUDIO VISUALIZER</h1>
    <div id="dropzone">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00ffcc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      <p class="hint">Drop your audio file here</p>
      <p class="formats">MP3 · WAV · OGG · FLAC · AAC</p>
      <button id="browse-btn">Browse file</button>
      <input type="file" id="file-input" accept="audio/*" />
    </div>
    <p id="status"></p>
  </div>

  <!-- Loading -->
  <div id="loading">
    <p id="loading-title">Processing audio</p>
    <p id="track-name-loading"></p>
    <div id="progress-bar-wrap">
      <div id="progress-bar-fill"></div>
    </div>
    <p id="progress-pct">0%</p>
  </div>

  <!-- Playback controls -->
  <div id="controls">
    <!-- Seekable progress line -->
    <div id="ctrl-progress-wrap">
      <div id="ctrl-progress-fill"></div>
      <div id="ctrl-progress-thumb"></div>
    </div>

    <div id="ctrl-inner">
      <!-- Track name -->
      <span id="ctrl-name"></span>

      <!-- Buttons -->
      <div id="ctrl-buttons">
        <button class="ctrl-btn" id="btn-back10" aria-label="Back 10s" title="Back 10s (←)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
            <text x="8" y="14" font-size="6" fill="currentColor" stroke="none" font-family="sans-serif" font-weight="bold">10</text>
          </svg>
        </button>

        <button class="ctrl-btn" id="btn-playpause" aria-label="Pause"></button>

        <button class="ctrl-btn" id="btn-fwd10" aria-label="Forward 10s" title="Forward 10s (→)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/>
            <text x="8" y="14" font-size="6" fill="currentColor" stroke="none" font-family="sans-serif" font-weight="bold">10</text>
          </svg>
        </button>
      </div>

      <!-- Time -->
      <span id="ctrl-time">0:00 / 0:00</span>
    </div>

    <p id="ctrl-hint">Space · pause/play &nbsp;|&nbsp; ← → · seek 10s</p>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js" } }
  </script>
  <script type="module" src="AudioVisualizer.js"></script>

</body>
</html>
